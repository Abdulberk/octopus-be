<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Signage Player</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      #player-root {
        width: 100vw;
        height: 100vh;
      }

      #status-overlay {
        position: fixed;
        left: 12px;
        bottom: 12px;
        padding: 8px 10px;
        font: 12px/1.2 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        color: #fff;
        background: rgba(0, 0, 0, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        z-index: 10;
        user-select: none;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="player-root"></div>
    <div id="status-overlay">booting...</div>
    <script src="./player-config.js"></script>
    <script src="./vendor/mqtt.min.js"></script>
    <script src="./tizen-player.js"></script>
  </body>
</html>
